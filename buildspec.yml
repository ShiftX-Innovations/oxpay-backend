version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
      nodejs: 18
    commands:
      - npm install -g aws-cdk
      - pip install -r requirements.txt

  build:
    commands:
      - cdk synth OxPay-App-dev
      - cdk synth OxPay-App-staging
      - cdk synth OxPay-App-prod

artifacts:
  files:
    - "cdk.out/**/*"
  base-directory: "."